<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical AI Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0056b3; 
            --secondary-color: #e3f2fd; 
            --bg-color: #f4f7f6;
            --text-main: #333333;
            --text-light: #666666;
            --white: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 92%;
            max-width: 1100px; /* Mărit pentru o vizualizare mai bună pe laptop */
            height: 92vh;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: var(--white);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow);
            z-index: 10;
        }

        header .logo {
            font-size: 32px;
            background: var(--white);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        header h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        header p {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 3px;
        }

        #chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: #fafbfc;
            scroll-behavior: smooth;
        }

        .message-wrapper {
            display: flex;
            gap: 12px;
            max-width: 80%; /* Ajustat pentru a lăsa spațiu graficelor mari */
            animation: fadeIn 0.3s ease-in-out;
        }

        .message-wrapper.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-wrapper.bot {
            align-self: flex-start;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            background: var(--white);
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }

        .bot .avatar { background: var(--secondary-color); }
        .user .avatar { background: #e0e0e0; }

        .message-content {
            padding: 14px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            box-shadow: var(--shadow);
            position: relative;
            word-break: break-word;
        }

       
        .message-content img {
            display: block;
            width: 100%;          
            max-width: 600px;     
            height: auto;         
            border-radius: 12px;
            margin-top: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .bot .message-content {
            background: var(--white);
            color: var(--text-main);
            border-top-left-radius: 4px;
            border: 1px solid #eee;
        }

        .user .message-content {
            background: var(--primary-color);
            color: var(--white);
            border-top-right-radius: 4px;
        }

        .input-area {
            background: var(--white);
            padding: 15px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-area input {
            flex: 1;
            padding: 15px 20px;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: 30px;
            outline: none;
            transition: border 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .input-area input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        .input-area button {
            padding: 15px 25px;
            background: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .input-area button:hover {
            background: #004494;
        }

        .disclaimer {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-light);
            padding-bottom: 10px;
            background: var(--white);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 5px;
            align-items: center;
        }
        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: #aaa;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo">⚕️</div>
        <div>
            <h1>MediBot AI</h1>
            <p>Interactive Educational Medical Assistant</p>
        </div>
    </header>

    <div id="chat">
        <div class="message-wrapper bot">
            <div class="avatar">⚕️</div>
            <div class="message-content">
                <div class="text">Hello! I'm MediBot. How can I assist you with your learning today?</div>
            </div>
        </div>
    </div>

    <div>
        <div class="input-area">
            <input type="text" id="question" placeholder="Ask a medical question..." onkeypress="handleKeyPress(event)" autocomplete="off" />
            <button onclick="send()" id="sendBtn">Send</button>
        </div>
        <div class="disclaimer">
            *This chatbot is an educational degree project and does not replace professional medical advice.
        </div>
    </div>
</div>

<script>
    const chatElement = document.getElementById("chat");
    const inputElement = document.getElementById("question");

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            send();
        }
    }

    function addMessage(text, sender, img=null) {
        let msgWrapper = document.createElement("div");
        msgWrapper.className = "message-wrapper " + sender;

        let avatarIcon = sender === "user" ? "👤" : "⚕️";
        
        let contentDiv = document.createElement("div");
        contentDiv.className = "message-content";
        
        let textDiv = document.createElement("div");
        textDiv.className = "text";
        textDiv.textContent = text;
        contentDiv.appendChild(textDiv);

        if (img) {
            let image = document.createElement("img");
            image.src = "data:image/png;base64," + img;
            contentDiv.appendChild(image);
        }

        msgWrapper.innerHTML = `<div class="avatar">${avatarIcon}</div>`;
        msgWrapper.appendChild(contentDiv);

        chatElement.appendChild(msgWrapper);
        scrollToBottom();
    }

    // Păstrarea restului funcțiilor de JavaScript neschimbate
    function showTypingIndicator() {
        let msgWrapper = document.createElement("div");
        msgWrapper.className = "message-wrapper bot typing-msg";
        msgWrapper.id = "typingIndicator";
        msgWrapper.innerHTML = `
            <div class="avatar">⚕️</div>
            <div class="message-content">
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>
        `;
        chatElement.appendChild(msgWrapper);
        scrollToBottom();
    }

     Pelm = document.getElementById("typingIndicator");
    function removeTypingIndicator() {
        const indicator = document.getElementById("typingIndicator");
        if (indicator) indicator.remove();
    }

    function scrollToBottom() {
        chatElement.scrollTop = chatElement.scrollHeight;
    }

    function send() {
        let q = inputElement.value.trim();
        if (q === "") return; 

        inputElement.disabled = true;
        document.getElementById("sendBtn").disabled = true;

        addMessage(q, "user");
        inputElement.value = "";
        showTypingIndicator();

        fetch("/ask", {
            method: "POST",
            headers: {"Content-Type": "application/x-www-form-urlencoded"},
            body: "question=" + encodeURIComponent(q)
        })
        .then(res => res.json())
        .then(data => {
            removeTypingIndicator();
            addMessage(data.answer, "bot", data.img);
        })
        .catch(error => {
            removeTypingIndicator();
            addMessage("An error occurred while connecting to the server. Please try again.", "bot");
            console.error("Error:", error);
        })
        .finally(() => {
            inputElement.disabled = false;
            document.getElementById("sendBtn").disabled = false;
            inputElement.focus();
        });
    }
</script>
</body>
</html>
